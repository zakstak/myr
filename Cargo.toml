[package]
name = "myr"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["multipart", "json"] }
cpal = "0.15"
hound = "3.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.36", features = ["full", "macros"] }
base64 = "0.22"
